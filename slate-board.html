<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slate — לוח ניהול פרויקטים</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#f6f7fb;color:#323338;min-height:100vh}
input,select,button{font-family:inherit}
input:focus,select:focus{outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d0d4e4;border-radius:3px}
.wrap{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #e6e9ef;padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.logo{width:30px;height:30px;border-radius:8px;background:#f65c8b;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;color:#323338;flex:1}
.tbtn{padding:7px 15px;border-radius:8px;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.tbtn:hover{filter:brightness(.92)}
.content{flex:1;padding:20px;overflow:auto}
.group{margin-bottom:24px}
.gh{display:flex;align-items:center;gap:8px;padding:5px 0}
.gbtn{width:22px;height:22px;border-radius:4px;border:none;background:transparent;cursor:pointer;font-size:11px;color:#adb1c2;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gbtn:hover{background:#f0f0f9;color:#6e5ce7}
.gbtn.open{color:#6e5ce7}
.gbar{width:8px;height:28px;border-radius:3px;flex-shrink:0}
.gname{font-size:14px;font-weight:700;border:none;background:transparent;color:#323338;padding:2px 6px;border-radius:5px;cursor:pointer}
.gname:focus{background:#f0f0f9;outline:none;cursor:text}
.gcnt{font-size:12px;color:#adb1c2}
.gdel{width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:#d0d4e4;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;margin-right:auto}
.gdel:hover{background:#fff0f0;color:#d83b3b}
.gbody{background:#fff;border:1px solid #e6e9ef;border-radius:0 8px 8px 8px;overflow:hidden}
.thead{display:flex;background:#f8f8fc;border-bottom:1px solid #e6e9ef;overflow-x:auto}
.th{padding:8px 10px;font-size:11px;font-weight:700;color:#676879;letter-spacing:.4px;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:4px;position:relative;border-left:1px solid #e9eaf0}
.th-h{display:none}
.th-h:hover{color:#6e5ce7}
.th-m{opacity:0;cursor:pointer;color:#adb1c2;font-size:14px;padding:0 3px;margin-right:auto}
.th:hover .th-m{opacity:1}
.th-m:hover{background:#e6e9ef;border-radius:3px}
.th.dragging{opacity:.3;background:#ece9fc}
.th.drag-over{box-shadow:inset -2px 0 0 #6e5ce7;background:#f0f0f9}
.th.drag-over-left{box-shadow:inset 2px 0 0 #6e5ce7;background:#f0f0f9}
.add-col{padding:8px 14px;font-size:11px;font-weight:700;color:#adb1c2;cursor:pointer;white-space:nowrap;flex-shrink:0;border-right:1px solid #f0f0f5}
.add-col:hover{color:#6e5ce7;background:#f0f0f9}
.trow{border-bottom:1px solid #f0f0f5;background:#fff}
.trow:last-of-type{border-bottom:none}
.trow-main{display:flex;transition:background .1s}
.trow-main:hover{background:#f8f8fc}
.cell{padding:7px 6px;display:flex;align-items:center;justify-content:center;min-height:40px;font-size:13px;color:#323338;flex-shrink:0;border-left:1px solid #f0f0f5}
.rbar{width:6px;align-self:stretch;flex-shrink:0;margin-left:3px}
.xbtn{width:22px;height:22px;border-radius:4px;border:none;background:transparent;cursor:pointer;font-size:10px;color:#adb1c2;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:2px}
.xbtn:hover{background:#f0f0f9;color:#6e5ce7}
.xbtn.open{color:#6e5ce7}
.ni2{border:none;background:transparent;font-size:13px;font-weight:500;color:#323338;width:100%;cursor:pointer;padding:2px 4px;border-radius:4px}
.ni2:focus{background:#ece9fc;cursor:text}
.scnt{font-size:10px;color:#6e5ce7;background:#ece9fc;border-radius:10px;padding:1px 7px;margin-right:5px;font-weight:700;flex-shrink:0}
.pill{padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center}
.pill:hover{filter:brightness(.93)}
.dspan{font-size:12px;color:#676879;cursor:pointer;padding:3px 7px;border-radius:5px}
.dspan:hover{background:#f0f0f9}
.dinp{font-size:12px;border:1px solid #c5c7f7;border-radius:5px;padding:2px 6px;background:#fff;width:108px}
.ninp{font-size:13px;border:none;background:transparent;width:100%;text-align:left;padding:2px 4px;border-radius:4px}
.ninp:focus{background:#ece9fc}
.tinp{font-size:12px;color:#676879;border:none;background:transparent;width:100%;padding:2px 4px;border-radius:4px}
.tinp:focus{background:#f0f0f9}
.dbtn{width:26px;height:26px;border-radius:6px;border:none;background:transparent;color:#d0d4e4;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.dbtn:hover{background:#fff0f0;color:#d83b3b}
.subs{background:#f8f9ff;border-top:1px solid #ecedf5}
.srow{display:flex;align-items:center;border-bottom:1px solid #ecedf5;min-height:30px;transition:background .1s}
.srow:last-of-type{border-bottom:none}
.srow:hover{background:#f0f1fa}
.sind{width:48px;flex-shrink:0;align-self:stretch;position:relative}
.sind::before{content:'';position:absolute;right:22px;top:0;bottom:50%;border-right:1.5px solid #d0d4e4}
.sind::after{content:'';position:absolute;right:22px;top:50%;width:14px;border-top:1.5px solid #d0d4e4}
.sdot{width:5px;height:5px;border-radius:50%;background:#c4c7d0;flex-shrink:0;margin-left:6px}
.sname{flex:1;min-width:0}
.sni{border:none;background:transparent;font-size:11px;color:#555;width:100%;cursor:pointer;padding:2px 4px;border-radius:3px}
.sni:focus{background:#ece9fc;cursor:text;outline:none;color:#323338}
.sst{flex-shrink:0;padding:0 8px}
.sdel{width:20px;height:20px;border-radius:4px;border:none;background:transparent;color:#d0d4e4;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:6px;opacity:0}
.srow:hover .sdel{opacity:1}
.sdel:hover{background:#fff0f0;color:#d83b3b}
.adds{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 48px;font-size:11px;color:#adb1c2;cursor:pointer;border-top:1px dashed #e0e2f0}
.adds:hover{color:#6e5ce7;background:#f0f1fa}
.addr{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:12px;color:#adb1c2;cursor:pointer;border-top:1px solid #f0f0f5}
.addr:hover{color:#6e5ce7;background:#f8f8fc}
.addg{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;background:#fff;border:1.5px dashed #d0d4e4;color:#adb1c2;cursor:pointer;font-size:13px;font-weight:600;width:fit-content;margin-top:8px}
.addg:hover{border-color:#6e5ce7;color:#6e5ce7;background:#f8f8fc}
.dd{position:fixed;z-index:9999;background:#fff;border:1px solid #e6e9ef;border-radius:9px;box-shadow:0 6px 22px rgba(0,0,0,.13);padding:5px;min-width:150px}
.ddi{padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#323338;display:flex;align-items:center;gap:7px}
.ddi:hover{background:#f0f0f9}
.ddi.red{color:#d83b3b}
.ddi.red:hover{background:#fff0f0}
.dds{height:1px;background:#f0f0f5;margin:3px 0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;padding:26px;width:320px;box-shadow:0 10px 36px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;color:#323338}
.ctypes{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.ctype{padding:9px 11px;border-radius:7px;border:1.5px solid #e6e9ef;cursor:pointer;font-size:13px;font-weight:600;color:#676879;display:flex;align-items:center;gap:6px}
.ctype:hover,.ctype.sel{border-color:#6e5ce7;color:#6e5ce7;background:#f8f8fc}
.mfield{margin-bottom:14px}
.mfield label{font-size:11px;font-weight:700;color:#adb1c2;display:block;margin-bottom:5px;letter-spacing:.3px}
.mfield input{width:100%;padding:9px 11px;border:1.5px solid #e6e9ef;border-radius:8px;font-size:13px;color:#323338}
.mfield input:focus{border-color:#6e5ce7;outline:none}
.mact{display:flex;gap:8px;justify-content:flex-end}
.mbtn{padding:8px 18px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}

.color-palette{position:fixed;z-index:9999;background:#fff;border:1px solid #e6e9ef;border-radius:10px;box-shadow:0 6px 22px rgba(0,0,0,.15);padding:10px;display:flex;flex-wrap:wrap;gap:6px;width:144px}
.cp-swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0}
.cp-swatch:hover{transform:scale(1.18)}
.cp-swatch.active{border-color:#323338}


.sum-toggle{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#f0f0f9;border-top:1.5px solid #d8d8f0;cursor:pointer;font-size:11px;font-weight:700;color:#6e5ce7;user-select:none}
.sum-toggle:hover{background:#e8e8f8}
.sum-chev{font-size:10px;transition:transform .2s;display:inline-block}
.sum-chev.open{transform:rotate(90deg)}
.sum-body{display:flex;background:#f4f4fc;border-top:1px solid #e6e6f5;overflow:hidden;max-height:0;transition:max-height .25s}
.sum-cell{padding:10px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border-left:1px solid #e6e6f5;gap:3px}
.sum-lbl{font-size:10px;color:#adb1c2;font-weight:600;letter-spacing:.3px}
.sum-val{font-size:14px;font-weight:800;color:#323338}

.cg{position:fixed;pointer-events:none;z-index:9998;background:#ece9fc;border:2px solid #6e5ce7;border-radius:7px;padding:5px 13px;font-size:12px;font-weight:700;color:#6e5ce7;opacity:.92;white-space:nowrap}
.tdisp{font-size:14px;font-family:monospace;font-weight:700;min-width:62px;cursor:pointer;padding:2px 3px;border-radius:3px;display:inline-block}
.tdisp:hover{background:#f0f0f9}
.tedit{font-size:11px;font-family:monospace;font-weight:700;border:1px solid #c5c7f7;border-radius:4px;padding:2px 5px;background:#fff;width:72px;color:#6e5ce7;outline:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">S</div>
    <div class="topbar-title">לוח ניהול פרויקטים</div>
    <button class="tbtn" style="background:#f65c8b" onclick="addTaskToFirst()">+ שלב</button>
    <button class="tbtn" style="background:#6e5ce7" onclick="addGroup()">+ פרויקט</button>
    <div style="width:1px;height:22px;background:#e6e9ef;margin:0 4px"></div>
    <button class="tbtn" style="background:#037f4c" onclick="saveToSheets()" title="שמור לגוגל שיטס">&#9729; שמור לענן</button>
    <label class="tbtn" style="background:#0086c0;cursor:pointer" title="טען נתונים מקובץ">&#11014; טען נתונים<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    <span id="save-status" style="font-size:12px;color:#037f4c;font-weight:600;min-width:120px;text-align:center"></span>
  </div>
  <div class="content" id="content"></div>
</div>
<div class="modal-bg" id="mbg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>הוסף עמודה</h3>
    <div class="ctypes" id="ctypes"></div>
    <div class="mfield"><label>שם העמודה</label><input id="cni" placeholder="לדוגמה: תקציב, הערות..."></div>
    <div class="mact">
      <button class="mbtn" style="background:#f0f0f9;color:#676879" onclick="closeModal()">ביטול</button>
      <button class="mbtn" style="background:#6e5ce7;color:#fff" onclick="confirmCol()">הוסף</button>
    </div>
  </div>
</div>
<script>
var U=[{id:'u1',name:'Alex',ini:'AC',color:'#6e5ce7'},{id:'u2',name:'Sara',ini:'SK',color:'#00c875'},{id:'u3',name:'Ben',ini:'BP',color:'#ff7b3d'}];
var STS=[{l:'הושלם',bg:'#00c875',fg:'#fff'},{l:'בביצוע',bg:'#fdab3d',fg:'#fff'},{l:'תקוע',bg:'#e2445c',fg:'#fff'},{l:'לא התחיל',bg:'#c4c4c4',fg:'#323338'},{l:'ממתין',bg:'#784bd1',fg:'#fff'}];
var PRS=[{l:'קריטי',bg:'#333',fg:'#fff'},{l:'גבוה',bg:'#e2445c',fg:'#fff'},{l:'בינוני',bg:'#fdab3d',fg:'#fff'},{l:'נמוך',bg:'#00c875',fg:'#fff'}];
var CTY=[['status','S','סטטוס'],['priority','P','עדיפות'],['owner','O','אחראי'],['date','D','תאריך'],['number','N','מספר'],['text','T','טקסט'],['timer','T','טיימר'],['payment','$','לתשלום']];
var GC=['#ff5ac4','#00c875','#fdab3d','#0086c0','#6e5ce7','#e2445c'];
var DS=['שלב א - תכנון מוקדם','שלב ב - רישוי','שלב ג - מכרז קבלנים','שלב ד - ביצוע ופיקוח'];
var nid=10;function nxt(){return ''+(nid++);}
var pCT='status',ddEl=null,ghost=null,drag={on:false},tick=null;

var COLS=[
  {id:'cs',type:'status',label:'סטטוס',w:120},
  {id:'cp',type:'priority',label:'עדיפות',w:100},
  {id:'co',type:'owner',label:'אחראי',w:110},
  {id:'cd',type:'date',label:'תאריך יעד',w:115},
  {id:'ctmr',type:'timer',label:'טיימר',w:165},
  {id:'chr',type:'number',label:'עלות שעתית',w:110},
  {id:'cpay',type:'payment',label:'לתשלום',w:115}
];
var GR=[{id:'g1',name:'פרויקט ראשי',color:'#ff5ac4',open:true}];
var TK=[
  {id:'t1',name:'שלב א - תכנון מוקדם',status:'לא התחיל',priority:'בינוני',owner:'u1',date:'',gid:'g1',ex:{},exp:false,subs:[]},
  {id:'t2',name:'שלב ב - רישוי',status:'לא התחיל',priority:'בינוני',owner:'u1',date:'',gid:'g1',ex:{},exp:false,subs:[]},
  {id:'t3',name:'שלב ג - מכרז קבלנים',status:'לא התחיל',priority:'בינוני',owner:'u1',date:'',gid:'g1',ex:{},exp:false,subs:[]},
  {id:'t4',name:'שלב ד - ביצוע ופיקוח',status:'לא התחיל',priority:'בינוני',owner:'u1',date:'',gid:'g1',ex:{},exp:false,subs:[]}
];

function gt(id){return TK.find(function(t){return t.id===id;});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/>/g,'&gt;');}
function pad(n){return n<10?'0'+n:''+n;}
function fmt(ms){var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return pad(h)+':'+pad(m)+':'+pad(sc);}


var PALETTE=['#ff5ac4','#e2445c','#fdab3d','#ffcb00','#00c875','#037f4c','#0086c0','#579bfc','#6e5ce7','#784bd1','#ff7b3d','#333333','#adb1c2','#ff9898','#a2e4b8'];

function openColorPalette(e,gid){
  e.stopPropagation();
  closeDD();
  var g=GR.find(function(x){return x.id===gid;});
  if(!g)return;
  var dd=document.createElement('div');dd.className='color-palette';
  PALETTE.forEach(function(clr){
    var sw=document.createElement('div');
    sw.className='cp-swatch'+(g.color===clr?' active':'');
    sw.style.background=clr;
    sw.title=clr;
    sw.onclick=function(ev){ev.stopPropagation();g.color=clr;dd.remove();ddEl=null;render();};
    dd.appendChild(sw);
  });
  document.body.appendChild(dd);ddEl=dd;
  var r=e.currentTarget.getBoundingClientRect();
  dd.style.top=(r.bottom+4)+'px';
  dd.style.right=(window.innerWidth-r.right-10)+'px';
  setTimeout(function(){document.addEventListener('click',closeDD,{once:true});},0);
}


function rSummary(gid){
  var tasks=TK.filter(function(t){return t.gid===gid;});
  var sid='sum-'+gid;
  var totalMs=0;
  tasks.forEach(function(t){
    for(var ci=0;ci<COLS.length;ci++){
      if(COLS[ci].type==='timer'){
        var ts=t.ex[COLS[ci].id]||{total:0,run:false,since:null};
        totalMs+=ts.run?ts.total+(Date.now()-ts.since):ts.total;
      }
    }
  });
  var totalPay=0;
  tasks.forEach(function(t){
    var tms=0;
    for(var ci=0;ci<COLS.length;ci++){
      if(COLS[ci].type==='timer'){var ts=t.ex[COLS[ci].id]||{total:0,run:false,since:null};tms+=ts.run?ts.total+(Date.now()-ts.since):ts.total;}
    }
    var hrs=tms/3600000,rate=parseFloat(t.ex['chr']||0);
    if(!rate){for(var ci2=0;ci2<COLS.length;ci2++){if(COLS[ci2].type==='number'&&COLS[ci2].label.indexOf('עלות')>=0){var rv=parseFloat(t.ex[COLS[ci2].id]||0);if(rv>0){rate=rv;break;}}}}
    totalPay+=hrs*rate;
  });

  var h='<div class="sum-toggle" onclick="togSum(\''+sid+'\')"><span class="sum-chev" id="chev-'+sid+'">&#9654;</span><span>סיכום פרויקט</span><span style="margin-right:auto;font-size:10px;color:#adb1c2;font-weight:500" id="lbl-'+sid+'">לחץ לפתיחה</span></div>';
  h+='<div class="sum-body" id="'+sid+'">';
  h+='<div class="sum-cell" style="width:250px;flex-shrink:0"></div>';
  for(var ci=0;ci<COLS.length;ci++){
    var col=COLS[ci];
    var cellH='';
    if(col.type==='timer'){
      cellH='<div class="sum-lbl">סה"כ שעות</div><div class="sum-val" style="color:#6e5ce7;font-family:monospace">'+fmt(totalMs)+'</div>';
    } else if(col.type==='payment'){
      var payStr=totalPay>0?'₪'+Math.round(totalPay).toLocaleString():'—';
      var payCol=totalPay>0?'#037f4c':'#adb1c2';
      cellH='<div class="sum-lbl">סה"כ לתשלום</div><div class="sum-val" style="color:'+payCol+'">'+payStr+'</div>';
    }
    h+='<div class="sum-cell" style="width:'+col.w+'px">'+cellH+'</div>';
  }
  h+='<div class="sum-cell" style="width:36px"></div>';
  h+='</div>';
  return h;
}
function togSum(sid){
  var body=document.getElementById(sid);
  var chev=document.getElementById('chev-'+sid);
  var lbl=document.getElementById('lbl-'+sid);
  if(!body)return;
  var isOpen=body.style.maxHeight!=='0px'&&body.style.maxHeight!=='';
  body.style.maxHeight=isOpen?'0':'120px';
  if(chev)chev.classList.toggle('open',!isOpen);
  if(lbl)lbl.textContent=isOpen?'לחץ לפתיחה':'לחץ לסגירה';
}



var SHEETS_URL='https://script.google.com/macros/s/AKfycbyrIM3M0kIGx_Kc56_0qEX26jBrVhvAXYfgIKHSOy9NSNG1lfVAr21S1bJCIGpRsmMWqw/exec';
var saveTimer=null;

function saveToSheets(){
  var data={GR:GR,TK:TK,COLS:COLS};
  var rows=[['SLATE_DATA',JSON.stringify(data)]];
  var formData=new FormData();
  formData.append('data',JSON.stringify(rows));
  fetch(SHEETS_URL,{method:'POST',body:formData,mode:'no-cors'})
    .then(function(){showSaveStatus('✓ נשמר בענן');})
    .catch(function(){showSaveStatus('⚠ שגיאת שמירה');});
}

function loadFromSheets(){
  showSaveStatus('⏳ טוען...');
  fetch(SHEETS_URL+'?action=load')
    .then(function(r){return r.json();})
    .then(function(result){
      if(result&&result.data){
        var data=JSON.parse(result.data);
        if(data.GR&&data.TK){
          GR=data.GR;TK=data.TK;
          if(data.COLS&&data.COLS.length)COLS=data.COLS;
          render();
          showSaveStatus('✓ נטען בהצלחה');
        } else {
          render();
          showSaveStatus('');
        }
      } else {
        render();
        showSaveStatus('');
      }
    })
    .catch(function(){render();showSaveStatus('');});
}

function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){saveToSheets();},2000);
}

function showSaveStatus(msg){
  var el=document.getElementById('save-status');
  if(el){el.textContent=msg;clearTimeout(el._t);el._t=setTimeout(function(){el.textContent='';},3000);}
}

function exportData(){saveToSheets();}
function importData(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(data.GR&&data.TK){GR=data.GR;TK=data.TK;if(data.COLS&&data.COLS.length)COLS=data.COLS;render();saveToSheets();}
      else{alert('קובץ לא תקין');}
    }catch(err){alert('שגיאה בטעינת הקובץ');}
  };
  reader.readAsText(file);e.target.value='';
}


function render(){
  var c=document.getElementById('content'),html='';
  for(var i=0;i<GR.length;i++) html+=rGroup(GR[i]);
  html+='<div class="addg" onclick="addGroup()">+ הוסף פרויקט</div>';
  c.innerHTML=html;
  attachDrag();startTick();
}

function rGroup(g){
  var tasks=TK.filter(function(t){return t.gid===g.id;});
  var h='<div class="group">';
  h+='<div class="gh">';
  h+='<button class="gbtn'+(g.open?' open':'')+'" onclick="togG(\''+g.id+'\')">'+(g.open?'&#9660;':'&#9654;')+'</button>';
  h+='<div class="gbar" style="background:'+g.color+';cursor:pointer" onclick="openColorPalette(event,\''+g.id+'\')" title="בחר צבע"></div>';
  h+='<input class="gname" value="'+esc(g.name)+'" onblur="rnG(\''+g.id+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">';
  h+='<span class="gcnt">'+tasks.length+' שלבים</span>';
  h+='<button class="gdel" onclick="delG(\''+g.id+'\')" title="מחק פרויקט">&#10005;</button>';
  h+='</div>';
  if(g.open){
    h+='<div class="gbody">'+rThead();
    for(var i=0;i<tasks.length;i++) h+=rRow(tasks[i],g.color);
    h+='<div class="addr" onclick="addTask(\''+g.id+'\')">+ הוסף שלב</div>'+rSummary(g.id)+'</div>';
  }
  h+='</div>';
  return h;
}

function rThead(){
  var h='<div class="thead"><div class="th" style="width:250px;flex-shrink:0">שם שלב</div>';
  for(var i=0;i<COLS.length;i++){
    var c=COLS[i];
    h+='<div class="th" style="width:'+c.w+'px" data-ci="'+i+'" data-cid="'+c.id+'">';
    h+='<span class="th-h" data-dci="'+i+'" data-dcid="'+c.id+'">&#11835;</span>';
    h+='<span style="flex:1">'+c.label+'</span>';
    h+='<span class="th-m" onclick="cMenu(event,\''+c.id+'\')">&#8942;</span>';
    h+='</div>';
  }
  h+='<div class="add-col" onclick="openModal()">+ עמודה</div>';
  h+='<div class="th" style="width:36px"></div></div>';
  return h;
}

function rRow(t,gc){
  var sc=t.subs.length,dc=t.subs.filter(function(s){return s.status==='Done';}).length;
  var h='<div class="trow" id="r'+t.id+'"><div class="trow-main">';
  h+='<div class="cell" style="width:250px;flex-shrink:0;gap:4px;justify-content:flex-start">';
  h+='<div class="rbar" style="background:'+gc+'"></div>';
  h+='<button class="xbtn'+(t.exp?' open':'')+'" onclick="togT(\''+t.id+'\')" style="opacity:'+(sc>0?1:.25)+'">'+(t.exp?'&#9660;':'&#9654;')+'</button>';
  h+='<input class="ni2" value="'+esc(t.name)+'" onblur="rnT(\''+t.id+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()" style="flex:1">';
  if(sc>0) h+='<span class="scnt">'+dc+'/'+sc+'</span>';
  h+='</div>';
  for(var i=0;i<COLS.length;i++) h+=rCell(t,COLS[i]);
  h+='<div class="cell" style="width:36px;justify-content:center"><button class="dbtn" onclick="delT(\''+t.id+'\')">&#10005;</button></div>';
  h+='</div>';
  if(t.exp) h+=rSubs(t);
  h+='</div>';
  return h;
}

function rSubs(t){
  var h='<div class="subs">';
  for(var i=0;i<t.subs.length;i++){
    var s=t.subs[i],st=STS.find(function(x){return x.l===s.status;})||STS[3];
    h+='<div class="srow">';
    h+='<div class="sind"></div><div class="sdot"></div>';
    h+='<div class="sname"><input class="sni" value="'+esc(s.name)+'" oninput="rnS(\''+t.id+'\',\''+s.id+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></div>';
    h+='<div class="sst">"><button class="pill" style="background:'+st.bg+';color:'+st.fg+';font-size:10px;padding:2px 7px" onclick="openSubDD(event,\''+t.id+'\',\''+s.id+'\',this)">'+st.l+'</button></div>';
    h+='<button class="sdel" onclick="delS(\''+t.id+'\',\''+s.id+'\')">&#10005;</button>';
    h+='</div>';
  }
  h+='<div class="adds" onclick="addSub(\''+t.id+'\')">+ הוסף תת שלב</div></div>';
  return h;
}

function rCell(t,col){
  var w=col.w,h='';
  if(col.type==='status'){
    var s=STS.find(function(x){return x.l===t.status;})||STS[3];
    h='<div class="cell" style="width:'+w+'px"><button class="pill" style="background:'+s.bg+';color:'+s.fg+';width:calc(100% - 8px);justify-content:center;font-size:12px" onclick="openDD(event,\'status\',\''+t.id+'\',this)">'+s.l+'</button></div>';
  } else if(col.type==='priority'){
    var p=PRS.find(function(x){return x.l===t.priority;})||PRS[2];
    h='<div class="cell" style="width:'+w+'px"><button class="pill" style="background:'+p.bg+';color:'+p.fg+';width:calc(100% - 8px);justify-content:center;font-size:12px" onclick="openDD(event,\'priority\',\''+t.id+'\',this)">'+p.l+'</button></div>';
  } else if(col.type==='owner'){
    var u=U.find(function(x){return x.id===t.owner;})||U[0];
    h='<div class="cell" style="width:'+w+'px"><div style="display:flex;align-items:center;gap:5px;cursor:pointer" onclick="openDD(event,\'owner\',\''+t.id+'\',this)"><div class="av" style="width:24px;height:24px;font-size:8px;background:'+u.color+'">'+u.ini+'</div><span style="font-size:11px;color:#676879">'+u.name+'</span></div></div>';
  } else if(col.type==='date'){
    h='<div class="cell" style="width:'+w+'px"><span class="dspan" onclick="editDate(\''+t.id+'\',this)">'+(t.date||'&#8212;')+'</span></div>';
  } else if(col.type==='number'){
    var nv=t.ex[col.id]!=null?t.ex[col.id]:'';
    h='<div class="cell" style="width:'+w+'px"><input class="ninp" type="number" value="'+nv+'" placeholder="0" onblur="setEx(\''+t.id+'\',\''+col.id+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></div>';
  } else if(col.type==='text'){
    var tv=t.ex[col.id]||'';
    h='<div class="cell" style="width:'+w+'px"><input class="tinp" value="'+esc(tv)+'" placeholder="&#8212;" onblur="setEx(\''+t.id+'\',\''+col.id+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></div>';
  } else if(col.type==='timer'){
    var ts=t.ex[col.id]||{total:0,run:false,since:null};
    var el=ts.run?ts.total+(Date.now()-ts.since):ts.total;
    var rc=ts.run?'#6e5ce7':'#323338';
    var bb=ts.run?'#fff0f8':'#f0f0f9',bc=ts.run?'#e2445c':'#6e5ce7',bi=ts.run?'&#9632;':'&#9654;';
    h='<div class="cell" style="width:'+w+'px"><div style="display:flex;align-items:center;gap:3px">';
    h+='<span id="td-'+t.id+'-'+col.id+'" class="tdisp" style="color:'+rc+'" onclick="editT(\''+t.id+'\',\''+col.id+'\',this)" title="לחץ לעריכה">'+fmt(el)+'</span>';
    h+='<button onclick="togTimer(\''+t.id+'\',\''+col.id+'\')" style="width:24px;height:24px;border-radius:5px;border:none;cursor:pointer;background:'+bb+';color:'+bc+';font-size:11px">'+bi+'</button>';
    h+='<button onclick="rstTimer(\''+t.id+'\',\''+col.id+'\')" style="width:20px;height:20px;border-radius:5px;border:none;cursor:pointer;background:transparent;color:#d0d4e4;font-size:11px" title="אפס">&#8635;</button>';
    h+='</div></div>';
  } else if(col.type==='payment'){
    var tms=0;
    for(var ci=0;ci<COLS.length;ci++){if(COLS[ci].type==='timer'){var ts2=t.ex[COLS[ci].id]||{total:0,run:false,since:null};tms+=ts2.run?ts2.total+(Date.now()-ts2.since):ts2.total;}}
    var hrs=tms/3600000,rate=parseFloat(t.ex['chr']||0);
    if(!rate){for(var ci2=0;ci2<COLS.length;ci2++){if(COLS[ci2].type==='number'&&COLS[ci2].label.indexOf('\u05E2\u05DC\u05D5\u05EA')>=0){var rv=parseFloat(t.ex[COLS[ci2].id]||0);if(rv>0){rate=rv;break;}}}}
    var pay=hrs*rate,pc=pay>0?'#037f4c':'#adb1c2',ps=pay>0?'\u20AA'+Math.round(pay).toLocaleString():'\u2014';
    h='<div class="cell" style="width:'+w+'px"><span style="font-size:12px;font-weight:700;color:'+pc+'">'+ps+'</span></div>';
  } else {
    h='<div class="cell" style="width:'+w+'px">&#8212;</div>';
  }
  return h;
}

// Timer
function editT(tid,cid,span){
  var t=gt(tid);if(!t)return;
  var ts=t.ex[cid]||{total:0,run:false,since:null};
  var cur=fmt(ts.run?ts.total+(Date.now()-ts.since):ts.total);
  var inp=document.createElement('input');
  inp.className='tedit';inp.value=cur;inp.placeholder='00:00:00';
  inp.onblur=function(){
    var parts=inp.value.split(':');
    if(parts.length===3){var h=parseInt(parts[0])||0,m=parseInt(parts[1])||0,s=parseInt(parts[2])||0;t.ex[cid]={total:(h*3600+m*60+s)*1000,run:false,since:null};}
    render();
  };
  inp.onkeydown=function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape')render();};
  span.replaceWith(inp);inp.focus();inp.select();
}
function togTimer(tid,cid){
  var t=gt(tid);if(!t)return;
  var ts=t.ex[cid]||{total:0,run:false,since:null};
  t.ex[cid]=ts.run?{total:ts.total+(Date.now()-ts.since),run:false,since:null}:{total:ts.total||0,run:true,since:Date.now()};
  render();
}
function rstTimer(tid,cid){var t=gt(tid);if(!t)return;t.ex[cid]={total:0,run:false,since:null};render();}
function startTick(){
  if(tick)clearInterval(tick);
  function hasRun(){return TK.some(function(t){return t.ex&&Object.values(t.ex).some(function(v){return v&&v.run;});});}
  if(!hasRun())return;
  tick=setInterval(function(){
    if(!hasRun()){clearInterval(tick);tick=null;return;}
    TK.forEach(function(t){
      Object.entries(t.ex||{}).forEach(function(e){
        var cid=e[0],ts=e[1];
        if(ts&&ts.run){var el=document.getElementById('td-'+t.id+'-'+cid);if(el)el.textContent=fmt(ts.total+(Date.now()-ts.since));}
      });
    });
  },1000);
}

// Drag cols
function attachDrag(){document.querySelectorAll('.th[data-ci]').forEach(function(h){h.addEventListener('mousedown',function(e){if(e.target.classList.contains('th-m'))return;dStart.call({dataset:{dci:h.dataset.ci,dcid:h.dataset.cid}},e);});});}
function dStart(e){
  if(e.button!==0)return;e.preventDefault();
  var ci=parseInt(e.currentTarget.dataset.dci),col=COLS[ci];if(!col)return;
  drag={on:true,from:ci,over:ci};
  ghost=document.createElement('div');ghost.className='cg';
  ghost.style.cssText='left:'+(e.clientX+10)+'px;top:'+(e.clientY-14)+'px';
  ghost.textContent=col.label;
  document.body.appendChild(ghost);document.body.style.cursor='grabbing';
  document.addEventListener('mousemove',dMove);document.addEventListener('mouseup',dEnd);
}
function dMove(e){
  if(!drag.on)return;
  ghost.style.left=(e.clientX+10)+'px';ghost.style.top=(e.clientY-14)+'px';
  var over=drag.from;
  document.querySelectorAll('.th[data-ci]').forEach(function(th){var r=th.getBoundingClientRect();if(e.clientX>=r.left&&e.clientX<=r.right)over=parseInt(th.dataset.ci);});
  if(over!==drag.over){
    drag.over=over;
    document.querySelectorAll('.th[data-ci]').forEach(function(th){
      th.classList.remove('drag-over','drag-over-left','dragging');
      var i=parseInt(th.dataset.ci);
      if(i===drag.from)th.classList.add('dragging');
      else if(i===over)th.classList.add(over>drag.from?'drag-over':'drag-over-left');
    });
  }
}
function dEnd(){
  document.removeEventListener('mousemove',dMove);document.removeEventListener('mouseup',dEnd);
  if(ghost){ghost.remove();ghost=null;}document.body.style.cursor='';
  if(drag.on&&drag.from!==drag.over){var m=COLS.splice(drag.from,1)[0];COLS.splice(drag.over,0,m);}
  drag={on:false};render();
}

// Dropdowns
function openDD(e,type,tid,anchor){
  e.stopPropagation();closeDD();
  var items=[];
  if(type==='status') items=STS.map(function(s){return '<div class="ddi" onclick="setSt(\''+tid+'\',\''+s.l+'\')" style="color:'+s.bg+';font-weight:700">'+s.l+'</div>';});
  if(type==='priority') items=PRS.map(function(p){return '<div class="ddi" onclick="setPr(\''+tid+'\',\''+p.l+'\')" style="color:'+p.bg+';font-weight:700">'+p.l+'</div>';});
  if(type==='owner') items=U.map(function(u){return '<div class="ddi" onclick="setOw(\''+tid+'\',\''+u.id+'\')"><div class="av" style="width:18px;height:18px;font-size:7px;background:'+u.color+'">'+u.ini+'</div>'+u.name+'</div>';});
  posDD(mkDD(items),anchor);
}
function openSubDD(e,tid,sid,anchor){
  e.stopPropagation();closeDD();
  var items=STS.map(function(s){return '<div class="ddi" onclick="setSubSt(\''+tid+'\',\''+sid+'\',\''+s.l+'\')" style="color:'+s.bg+';font-weight:700">'+s.l+'</div>';});
  posDD(mkDD(items),anchor);
}
function cMenu(e,cid){
  e.stopPropagation();closeDD();
  var ci=COLS.findIndex(function(c){return c.id===cid;});
  var items=[
    '<div class="ddi" onclick="rnCol(\''+cid+'\')">&#9998; שנה שם</div>',
    '<div class="ddi" onclick="mvCol(\''+cid+'\',-1)"'+(ci===0?' style="opacity:.4;pointer-events:none"':'')+'>&#8592; שמאלה</div>',
    '<div class="ddi" onclick="mvCol(\''+cid+'\',1)"'+(ci===COLS.length-1?' style="opacity:.4;pointer-events:none"':'')+'>&#8594; ימינה</div>',
    '<div class="dds"></div>',
    '<div class="ddi red" onclick="delCol(\''+cid+'\')">&#10005; מחק</div>'
  ];
  posDD(mkDD(items),e.currentTarget);
}
function mkDD(items){
  var dd=document.createElement('div');dd.className='dd';dd.innerHTML=items.join('');
  document.body.appendChild(dd);ddEl=dd;
  setTimeout(function(){document.addEventListener('click',closeDD,{once:true});},0);
  return dd;
}
function posDD(dd,anchor){
  var r=anchor.getBoundingClientRect();
  dd.style.top=(r.bottom+3)+'px';dd.style.right=(window.innerWidth-r.right)+'px';
  requestAnimationFrame(function(){var er=dd.getBoundingClientRect();if(er.bottom>window.innerHeight-8)dd.style.top=(r.top-er.height-3)+'px';});
}
function closeDD(){if(ddEl){ddEl.remove();ddEl=null;}}

// Setters
function setSt(tid,v){var t=gt(tid);if(t)t.status=v;closeDD();render();autoSave();}
function setPr(tid,v){var t=gt(tid);if(t)t.priority=v;closeDD();render();autoSave();}
function setOw(tid,v){var t=gt(tid);if(t)t.owner=v;closeDD();render();autoSave();}
function setSubSt(tid,sid,v){var t=gt(tid);if(t){var s=t.subs.find(function(x){return x.id===sid;});if(s)s.status=v;}closeDD();render();autoSave();}
function setEx(tid,cid,v){var t=gt(tid);if(!t)return;t.ex[cid]=v;var col=COLS.find(function(c){return c.id===cid;});if(col&&(col.type==='number'||col.type==='timer')){render();autoSave();}}
function rnT(id,v){var t=gt(id);if(t&&v)t.name=v;}
function rnG(id,v){var g=GR.find(function(x){return x.id===id;});if(g&&v)g.name=v;}
function rnS(tid,sid,v){var t=gt(tid);if(t){var s=t.subs.find(function(x){return x.id===sid;});if(s)s.name=v;}}
function editDate(tid,span){
  var t=gt(tid);
  var inp=document.createElement('input');inp.type='date';inp.value=t?t.date:'';inp.className='dinp';
  inp.onblur=function(){if(t)t.date=inp.value;render();};
  inp.onkeydown=function(e){if(e.key==='Enter')inp.blur();};
  span.replaceWith(inp);inp.focus();
}
function rnCol(cid){var col=COLS.find(function(c){return c.id===cid;});if(!col)return;var n=prompt('שם:',col.label);if(n&&n.trim())col.label=n.trim();closeDD();render();}
function mvCol(cid,dir){var i=COLS.findIndex(function(c){return c.id===cid;}),j=i+dir;if(j<0||j>=COLS.length)return;var tmp=COLS[i];COLS[i]=COLS[j];COLS[j]=tmp;closeDD();render();}
function delCol(cid){COLS=COLS.filter(function(c){return c.id!==cid;});closeDD();render();}

// CRUD
function togG(id){var g=GR.find(function(x){return x.id===id;});if(g)g.open=!g.open;render();}
function delG(id){if(!confirm('למחוק את הפרויקט וכל שלביו?'))return;GR=GR.filter(function(g){return g.id!==id;});TK=TK.filter(function(t){return t.gid!==id;});render();autoSave();}
function togT(tid){var t=gt(tid);if(t)t.exp=!t.exp;render();}
function addSub(tid){
  var t=gt(tid);if(!t)return;
  t.exp=true;
  t.subs.push({id:'s'+nxt(),name:'',status:'לא התחיל'});
  render();
  setTimeout(function(){var inputs=document.querySelectorAll('input.sni');if(inputs.length)inputs[inputs.length-1].focus();},30);
  autoSave();
}
function delS(tid,sid){var t=gt(tid);if(!t)return;t.subs=t.subs.filter(function(s){return s.id!==sid;});render();autoSave();}
function addTask(gid){TK.push({id:'t'+nxt(),name:'שלב חדש',status:'לא התחיל',priority:'בינוני',owner:'u1',date:'',gid:gid,ex:{},exp:false,subs:[]});render();autoSave();}
function addTaskToFirst(){var g=GR[0];if(g)addTask(g.id);}
function delT(id){TK=TK.filter(function(t){return t.id!==id;});render();autoSave();}
function addGroup(){
  var clr=GC[GR.length%GC.length],gid='g'+nxt();
  GR.push({id:gid,name:'פרויקט חדש',color:clr,open:true});
  DS.forEach(function(name){TK.push({id:'t'+nxt(),name:name,status:'לא התחיל',priority:'בינוני',owner:'u1',date:'',gid:gid,ex:{},exp:false,subs:[]});});
  render();
}

// Modal
function openModal(){
  pCT='status';
  var h='';
  var labels={'status':'סטטוס','priority':'עדיפות','owner':'אחראי','date':'תאריך','number':'מספר','text':'טקסט','timer':'טיימר','payment':'לתשלום'};
  var types=['status','priority','owner','date','number','text','timer','payment'];
  types.forEach(function(type){h+='<div class="ctype'+(type===pCT?' sel':'')+'" onclick="selCT(\''+type+'\',this)">'+labels[type]+'</div>';});
  document.getElementById('ctypes').innerHTML=h;
  document.getElementById('cni').value='';
  document.getElementById('mbg').style.display='flex';
  setTimeout(function(){document.getElementById('cni').focus();},50);
}
function selCT(type,el){
  pCT=type;
  document.querySelectorAll('.ctype').forEach(function(e){e.classList.remove('sel');});
  el.classList.add('sel');
  var inp=document.getElementById('cni');
  var labels={'status':'סטטוס','priority':'עדיפות','owner':'אחראי','date':'תאריך','number':'מספר','text':'טקסט','timer':'טיימר','payment':'לתשלום'};
  if(!inp.value)inp.value=labels[type]||type;
}
function closeModal(){document.getElementById('mbg').style.display='none';}
function confirmCol(){
  var label=document.getElementById('cni').value.trim();
  var labels={'status':'סטטוס','priority':'עדיפות','owner':'אחראי','date':'תאריך','number':'מספר','text':'טקסט','timer':'טיימר','payment':'לתשלום'};
  if(!label)label=labels[pCT]||'עמודה';
  var w={text:155,number:90,timer:165,payment:115}[pCT]||125;
  COLS.push({id:'c'+nxt(),type:pCT,label:label,w:w});
  closeModal();render();
}

loadFromSheets();
</script>
